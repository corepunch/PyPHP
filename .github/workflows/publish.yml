name: Publish to PyPI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compute date-based version
        run: |
          python3 - <<'EOF'
          # Version scheme: {major}.{minor}.{patch}
          # Relative to project start date 2026-03-07:
          #   major increments each year, minor each month, patch each day
          from datetime import date
          from calendar import monthrange
          import os
          today = date.today()
          base  = date(2026, 3, 7)
          total_months = (today.year * 12 + today.month) - (base.year * 12 + base.month)
          day_offset   = today.day - base.day
          if day_offset < 0:
              total_months -= 1
              prev_month = today.month - 1 if today.month > 1 else 12
              prev_year  = today.year  if today.month > 1 else today.year - 1
              day_offset += monthrange(prev_year, prev_month)[1]
          major = 1 + max(0, total_months) // 12
          minor = max(0, total_months) % 12
          patch = max(0, day_offset)
          version = f"{major}.{minor}.{patch}"
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"PACKAGE_VERSION={version}\n")
          print(f"Computed version: {version}")
          EOF
      - name: Set version in pyproject.toml
        run: |
          python3 -c "
          import re, os
          v = os.environ['PACKAGE_VERSION']
          path = 'pyproject.toml'
          text = open(path).read()
          text = re.sub(r'^version = .*$', f'version = \"{v}\"', text, count=1, flags=re.MULTILINE)
          open(path, 'w').write(text)
          print(f'pyproject.toml version set to {v}')
          "
      - name: Build package
        run: |
          python -m pip install build
          python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write  # Required for OIDC
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          name: release-dists
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
