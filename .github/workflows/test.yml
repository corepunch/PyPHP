name: Test PyPHP

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tests
        run: |
          for phps_file in tests/*.phps; do
            if python pyphp.py "$phps_file" > /dev/null 2>&1; then
              echo "PASS: $phps_file"
            else
              echo "FAIL: $phps_file"
              python pyphp.py "$phps_file"
              exit 1
            fi
          done
