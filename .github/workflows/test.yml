name: Test PyPHP

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tests
        run: |
          for php_file in tests/*.php; do
            expected="${php_file%.php}.expected"
            if diff <(python pyphp.py "$php_file") "$expected" > /dev/null 2>&1; then
              echo "PASS: $php_file"
            else
              echo "FAIL: $php_file"
              diff <(python pyphp.py "$php_file") "$expected"
              exit 1
            fi
          done
